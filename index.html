<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clan Ranking</title>
  <style>
	body {
	  font-family: Arial;
	  margin: 40px;
	}

	table {
	  border-collapse: collapse;
	  width: 400px;
	}

	td, th {
	  padding: 8px 12px;
	  border: 1px solid #ccc;
	}

	th {
	  background: #333;
	  color: white;
	}

	tr:nth-child(even) {
	  background: #f2f2f2;
	}

	tr:hover {
	  background: #e6f0ff;
	}
	.good {
	  background-color: #d4edda;
	}

	.warning {
	  background-color: #fff3cd;
	}

	.bad {
	  background-color: #f8d7da;
	}
	.good td {
	  border-left: 4px solid #28a745;
	}

	.warning td {
	  border-left: 4px solid #ffc107;
	}

	.bad td {
	  border-left: 4px solid #dc3545;
	}
  </style>
</head>
<body>

<h1>Clan Ranking</h1>
<p id="fecha"></p>
<table id="tabla">
  <thead>
    <tr>
      <th>#</th>
      <th>Player</th>
      <th>Chests</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
fetch('ranking.json')
  .then(r => r.json())
  .then(data => {
    const date = new Date(data.generated_at);
    document.getElementById("fecha").textContent = "Updated at: " + date.toLocaleString();
    const tbody = document.querySelector("#tabla tbody");
    data.ranking.forEach(p => {
      const tr = document.createElement("tr");
      let className = "";
      if (p.chests >= 70) {
  	  className = "good";
      } else if (p.chests >= 50) {
          className = "warning";
      } else {
          className = "bad";
      }
      tr.classList.add(className);
      tr.innerHTML = `
        <td>${p.position}</td>
        <td>${p.player}</td>
        <td>${p.chests}</td>
      `;
      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
