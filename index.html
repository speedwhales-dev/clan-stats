<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clan Ranking</title>

<style>
:root{
    --bg:#f5f7fb;
    --card:#ffffff;
    --border:#e5e7eb;
    --header:#1f2937;
    --shadow:0 2px 10px rgba(0,0,0,.05);
}

*{
    box-sizing:border-box;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:var(--bg);
    margin:0;
    padding:16px;
}

/* ==========================
   TOP BAR
========================== */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

h1{
    margin:0;
    font-size:1.6rem;
}

#search{
    padding:10px;
    border:1px solid #ccc;
    border-radius:10px;
    min-width:220px;
}

#filtersBtn{
    background:#1f2937;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:8px;
}

/* ==========================
   CARDS
========================== */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:16px;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:14px;
    padding:16px;
    box-shadow:var(--shadow);
    border:1px solid var(--border);
}

.label{
    color:#6b7280;
    font-size:13px;
    margin-bottom:8px;
}

/* ==========================
   TABLE
========================== */

.table-container{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    border-radius:16px;
}

table{
    width:100%;
    min-width:850px;
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:var(--shadow);
    border-collapse:collapse;
}

th,
td{
    padding:8px 10px;
    border:1px solid #ddd;
    text-align:center;
    white-space:nowrap;
}

th{
    background:#1f2937;
    color:white;
    position:sticky;
    top:0;
    z-index:10;
}

tr:nth-child(even){
    background:#f7f7f7;
}

.bar{
    height:14px;
    background:#ececec;
    border-radius:20px;
    overflow:hidden;
    width:100%;
}

.fill{
    height:100%;
    border-radius:20px;
}

th:nth-child(4),
td:nth-child(4){
    min-width:220px;
}

/* ==========================
   FILTER PANEL
========================== */

.filters-panel{
    position:fixed;
    top:0;
    right:0;
    width:360px;
    max-width:100vw;
    height:100vh;
    background:white;
    box-shadow:-5px 0 20px rgba(0,0,0,.15);
    transform:translateX(100%);
    transition:.25s;
    overflow:auto;
    z-index:1000;
}

.filters-panel.open{
    transform:translateX(0);
}

.filters-header{
    padding:20px;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    background:white;
}

#columns{
    display:grid;
    gap:8px;
    padding:16px;
}

#columns label{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px;
    border-radius:8px;
}

#columns label:hover{
    background:#f4f4f4;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.3);
    opacity:0;
    pointer-events:none;
    transition:.25s;
    z-index:999;
}

#overlay.open{
    opacity:1;
    pointer-events:auto;
}

/* ==========================
   MOBILE
========================== */

@media (max-width: 768px){

    body{
        padding:10px;
    }

    .topbar{
        flex-direction:column;
        align-items:stretch;
    }

    .actions{
        width:100%;
        display:flex;
    }

    #search{
        flex:1;
        min-width:auto;
    }

    h1{
        text-align:center;
        font-size:1.4rem;
    }

    .cards{
        grid-template-columns:1fr;
    }

    .filters-panel{
        width:100%;
    }

    th,
    td{
        padding:6px;
        font-size:12px;
    }

    .bar{
        height:12px;
    }

    th:nth-child(4),
    td:nth-child(4){
        min-width:170px;
    }
}
</style>
</head>

<body>

<div class="topbar">

    <h1>🏆 Clan Ranking</h1>

    <div class="actions">

        <input
            type="text"
            id="search"
            placeholder="Search player..."
        >

        <button id="filtersBtn">
            ⚙ Columns
        </button>

    </div>

</div>

<div id="filtersPanel" class="filters-panel">

    <div class="filters-header">
    <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
    ">
        <h3 style="margin:0;">⚙ Columns</h3>

        <button
            id="closeFilters"
            style="
                border:none;
                background:none;
                font-size:22px;
                cursor:pointer;
            "
        >
            ✕
        </button>
    </div>
</div>

    <div id="columns"></div>

</div>

<div class="cards">

    <div class="card">
        <div class="label">Current week</div>
        <div id="weekInfo"></div>
    </div>

    <div class="card">
        <div class="label">Week progress</div>
        <div id="weekProgress"></div>
    </div>

    <div class="card">
        <div class="label">Last update</div>
        <div id="fecha"></div>
    </div>

    <div class="card">
        <div class="label">Total chests</div>
        <div id="totalChests"></div>
    </div>

</div>
<div class="table-container">
    <table id="tabla">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<script>
let ALL_DATA = null;

const STORAGE_KEY = "clan_columns_state";

/* columnas base */
let ORDER = [
  "Level 5 Crypt",
  "Level 10 Crypt",
  "Level 15 Crypt",
  "Level 20 Crypt",
  "Level 25 Crypt",
  "Level 10 rare Crypt",
  "Level 15 rare Crypt",
  "Level 20 rare Crypt",
  "Level 25 rare Crypt",
  "Level 30 rare Crypt",
  "Level 15 epic Crypt", 
  "Level 20 epic Crypt", 
  "Level 25 epic Crypt", 
  "Level 30 epic Crypt", 
  "Level 35 epic Crypt",
  "Rise of the Ancients event", 
  "Arena"
];

function normalizeType(type) {

  type = type.trim();

  if (type === "Level § Crypt") {
    type = "Level 5 Crypt";
  }

  return ORDER.includes(type)
    ? type
    : "Otros";
}

/* estado persistente */
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return s || {};
  } catch {
    return {};
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(COLUMN_STATE));
}

function getCurrentWeekRange() {
    const now = new Date();

    // Semana del evento: domingo 18:00 → domingo 18:00
    const start = new Date(now);

    const day = start.getDay(); // 0=domingo
    start.setHours(18, 0, 0, 0);

    if (day === 0 && now < start) {
        start.setDate(start.getDate() - 7);
    } else {
        start.setDate(start.getDate() - day);
    }

    const end = new Date(start);
    end.setDate(end.getDate() + 7);

    return { start, end };
}

const week = getCurrentWeekRange();

document.getElementById("weekInfo").textContent =
    `${
        week.start.toLocaleString("es-ES")
    } → ${
        week.end.toLocaleString("es-ES")
    } (Europe/Madrid)`;

// progreso de semana
const elapsedDays =
    (Date.now() - week.start.getTime()) /
    (1000 * 60 * 60 * 24);

document.getElementById("weekProgress").textContent =
    `${elapsedDays.toFixed(1)} / 7 days elapsed`;

/* columnas dinámicas */
function buildColumns(data) {
  const set = new Set();

  data.forEach(p => {
    Object.keys(p.types || {}).forEach(t => {
      set.add(normalizeType(t));
    });
  });

  const extras = [...set].filter(c => !ORDER.includes(c));

  /* IMPORTANTE: Otros siempre al final */
  ORDER = [...ORDER, ...extras.filter(x => x !== "Otros").sort(), "Otros"];

  const saved = loadState();

  ORDER.forEach(c => {
    COLUMN_STATE[c] = saved[c] ?? false;
  });
}

let COLUMN_STATE = {};

function renderColumnSelector() {
  const container = document.getElementById("columns");
  container.style.display = "grid";
  container.innerHTML = "";

  ORDER.forEach(col => {
    const label = document.createElement("label");

    label.innerHTML = `
      <input type="checkbox" data-col="${col}" ${COLUMN_STATE[col] ? "checked" : ""}>
      ${col}
    `;

    container.appendChild(label);
  });

  container.querySelectorAll("input").forEach(cb => {
    cb.addEventListener("change", e => {
      COLUMN_STATE[e.target.dataset.col] = e.target.checked;
      saveState();
      renderTable();
    });
  });
}

document.addEventListener("DOMContentLoaded", () => {
  const panel = document.getElementById("filtersPanel");
  const overlay = document.getElementById("overlay");
  const btn = document.getElementById("filtersBtn");

  function openFilters() {
    panel.classList.add("open");
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeFilters() {
    panel.classList.remove("open");
    overlay.classList.remove("open");
    document.body.style.overflow = "";
  }

  btn.addEventListener("click", openFilters);
  overlay.addEventListener("click", closeFilters);
  document.getElementById("closeFilters").addEventListener("click", closeFilters);
  
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      closeFilters();
    }
  });
});

function renderTable() {
  const thead = document.querySelector("#tabla thead");
  const tbody = document.querySelector("#tabla tbody");

  const visibleCols = ORDER.filter(c => COLUMN_STATE[c]);

  thead.innerHTML = `
    <tr>
      <th>#</th>
      <th>Player</th>
      <th>Total</th>
      <th>Progress</th>
      ${visibleCols.map(c => `<th>${c}</th>`).join("")}
    </tr>
  `;

  tbody.innerHTML = "";

  const search = document.getElementById("search").value.toLowerCase();

  ALL_DATA.ranking.sort((a, b) => {
    const va = a.total - (a.types['Level 5 Crypt'] || 0);
    const vb = b.total - (b.types['Level 5 Crypt'] || 0);
    return vb - va;
  });

  ALL_DATA.ranking.forEach((p, idx) => {
    p.position = idx + 1;
  });

  ALL_DATA.ranking
    .filter(p => p.player.toLowerCase().includes(search))
    .forEach((p, i) => {

      const types = {};

      Object.entries(p.types || {}).forEach(([k, v]) => {
        const nk = normalizeType(k);
        types[nk] = (types[nk] || 0) + v;
      });

      const score = p.total - (p.types?.['Level 5 Crypt'] || 0);
      const percent = isFinite(score) ? (score / 70) * 100 : 0;

      let barColor;

      if ((p.total - (p.types['Level 5 Crypt'] || 0) < 50)) {
        barColor = "#dc3545"; // rojo
      }
      else if ((p.total - (p.types['Level 5 Crypt'] || 0) < 70)) {
        barColor = "#ffc107"; // amarillo
      }
      else {
        barColor = "#28a745"; // verde
      }

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${p.position}</td>
        <td>${p.player}</td>
        <td>${p.total - (p.types['Level 5 Crypt'] || 0)}</td>
        <td style="width:100%">
          <div style="display:flex; gap:8px; align-items:center;">
            <span>(${percent.toFixed(0)}%)</span>
            <div class="bar">
       <div class="fill" style="width:${Math.min(percent,100)}%;background:${barColor}"></div>
            </div>
          </div>
        </td>
        ${visibleCols.map(c => `<td>${types[c] || 0}</td>`).join("")}
      `;

      tbody.appendChild(row);
    });
}

/* INIT */
fetch('ranking.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    ALL_DATA = data;

    COLUMN_STATE = loadState();

    buildColumns(data.ranking);
    renderColumnSelector();

    document.getElementById("search")
      .addEventListener("input", renderTable);

    const total = data.ranking.reduce((s, p) => s + p.total, 0);
    document.getElementById("totalChests").textContent =
      total;

    document.getElementById("fecha").textContent =
      new Date(data.generated_at).toLocaleString("es-ES");

    renderTable();
  });
</script>
<div id="overlay"></div>
</body>
</html>
