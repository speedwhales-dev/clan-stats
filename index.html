<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clan Ranking</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
}

h1 { margin-bottom: 5px; }

#toolbar {
  display: flex;
  gap: 20px;
  align-items: center;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

#search {
  padding: 6px;
  font-size: 14px;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}

td, th {
  padding: 6px 10px;
  border: 1px solid #ccc;
  text-align: center;
  white-space: nowrap;
}

th {
  background: #333;
  color: white;
  position: sticky;
  top: 0;
}

tr:nth-child(even) { background: #f5f5f5; }

/* progress */
.bar {
  width: 100%;
  height: 12px;
  background: #eee;
  border-radius: 6px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: #4caf50;
}

/* column selector */
.column-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  font-size: 12px;
}

#weekInfo,
#weekProgress {
  margin: 4px 0;
  color: #555;
}
</style>
</head>

<body>

<h1>Clan Ranking</h1>

<div id="toolbar">
  <input type="text" id="search" placeholder="Buscar jugador...">
  <div id="columns" class="column-controls"></div>
</div>

<p id="weekInfo"></p>
<p id="weekProgress"></p>

<p id="fecha"></p>
<p id="totalChests"></p>

<table id="tabla">
  <thead></thead>
  <tbody></tbody>
</table>

<script>
let ALL_DATA = null;

const STORAGE_KEY = "clan_columns_state";

/* columnas base */
let ORDER = [
  "Level 15 Crypt",
  "Level 20 Crypt",
  "Level 25 Crypt",
  "Arena"
];

/* OCR cleanup */
function isOCRGarbage(type) {
  const t = type.toLowerCase();

  if (t.includes("union")) return true;
  if (t.includes("chimme")) return true;
  if (t.includes("chimere")) return true;
  if (t.includes("epi ch") && !t.includes("level")) return true;
  if (t.includes("eni ch")) return true;
  if (t.includes("eni ")) return true;

  return false;
}

function normalizeType(type) {
  return isOCRGarbage(type) ? "Otros" : type;
}

/* estado persistente */
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return s || {};
  } catch {
    return {};
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(COLUMN_STATE));
}

function getCurrentWeekRange() {
    const now = new Date();

    // Semana del evento: domingo 18:00 → domingo 18:00
    const start = new Date(now);

    const day = start.getDay(); // 0=domingo
    start.setHours(18, 0, 0, 0);

    if (day === 0 && now < start) {
        start.setDate(start.getDate() - 7);
    } else {
        start.setDate(start.getDate() - day);
    }

    const end = new Date(start);
    end.setDate(end.getDate() + 7);

    return { start, end };
}

const week = getCurrentWeekRange();

document.getElementById("weekInfo").textContent =
    `Current event week: ${
        week.start.toLocaleString("es-ES")
    } → ${
        week.end.toLocaleString("es-ES")
    } (Europe/Madrid)`;

// progreso de semana
const elapsedDays =
    (Date.now() - week.start.getTime()) /
    (1000 * 60 * 60 * 24);

document.getElementById("weekProgress").textContent =
    `Week progress: ${elapsedDays.toFixed(1)} / 7 days elapsed`;

/* columnas dinámicas */
function buildColumns(data) {
  const set = new Set();

  data.forEach(p => {
    Object.keys(p.types || {}).forEach(t => {
      set.add(normalizeType(t));
    });
  });

  const extras = [...set].filter(c => !ORDER.includes(c));

  /* IMPORTANTE: Otros siempre al final */
  ORDER = [...ORDER, ...extras.filter(x => x !== "Otros").sort(), "Otros"];

  const saved = loadState();

  ORDER.forEach(c => {
    COLUMN_STATE[c] = saved[c] ?? false;
  });
}

let COLUMN_STATE = {};

function renderColumnSelector() {
  const container = document.getElementById("columns");
  container.innerHTML = "";

  ORDER.forEach(col => {
    const label = document.createElement("label");

    label.innerHTML = `
      <input type="checkbox" data-col="${col}" ${COLUMN_STATE[col] ? "checked" : ""}>
      ${col}
    `;

    container.appendChild(label);
  });

  container.querySelectorAll("input").forEach(cb => {
    cb.addEventListener("change", e => {
      COLUMN_STATE[e.target.dataset.col] = e.target.checked;
      saveState();
      renderTable();
    });
  });
}

function renderTable() {
  const thead = document.querySelector("#tabla thead");
  const tbody = document.querySelector("#tabla tbody");

  const visibleCols = ORDER.filter(c => COLUMN_STATE[c]);

  thead.innerHTML = `
    <tr>
      <th>#</th>
      <th>Player</th>
      <th>Total</th>
      <th>Progress</th>
      ${visibleCols.map(c => `<th>${c}</th>`).join("")}
    </tr>
  `;

  tbody.innerHTML = "";

  const search = document.getElementById("search").value.toLowerCase();

  ALL_DATA.ranking.sort((a, b) => {
    const va = a.total - (a.types['Level 5 Crypt'] || 0);
    const vb = b.total - (b.types['Level 5 Crypt'] || 0);
    return vb - va;
  });

  ALL_DATA.ranking.forEach((p, idx) => {
    p.position = idx + 1;
  });

  ALL_DATA.ranking
    .filter(p => p.player.toLowerCase().includes(search))
    .forEach((p, i) => {

      const types = {};

      Object.entries(p.types || {}).forEach(([k, v]) => {
        const nk = normalizeType(k);
        types[nk] = (types[nk] || 0) + v;
      });

      const percent = ((p.total - (p.types['Level 5 Crypt'] || 0)) / 70) * 100;

      let barColor;

      if ((p.total - (p.types['Level 5 Crypt'] || 0) < 50)) {
        barColor = "#dc3545"; // rojo
      }
      else if ((p.total - (p.types['Level 5 Crypt'] || 0) < 70)) {
        barColor = "#ffc107"; // amarillo
      }
      else {
        barColor = "#28a745"; // verde
      }

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${p.position}</td>
        <td>${p.player}</td>
        <td>${p.total - (p.types['Level 5 Crypt'] || 0)}</td>
        <td style="width:100%">
          <div style="display:flex; gap:8px; align-items:center;">
            <span>(${percent.toFixed(0)}%)</span>
            <div class="bar">
       <div class="fill" style="width:${Math.min(percent,100)}%;background:${barColor}"></div>
            </div>
          </div>
        </td>
        ${visibleCols.map(c => `<td>${types[c] || 0}</td>`).join("")}
      `;

      tbody.appendChild(row);
    });
}

/* INIT */
fetch('ranking.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    ALL_DATA = data;

    COLUMN_STATE = loadState();

    buildColumns(data.ranking);
    renderColumnSelector();

    document.getElementById("search")
      .addEventListener("input", renderTable);

    const total = data.ranking.reduce((s, p) => s + p.total, 0);
    document.getElementById("totalChests").textContent =
      "Total chests: " + total;

    document.getElementById("fecha").textContent =
      "Updated: " + new Date(data.generated_at).toLocaleString("es-ES");

    renderTable();
  });
</script>

</body>
</html>
