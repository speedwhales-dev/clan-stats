<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clan Ranking</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    table { border-collapse: collapse; }
    td, th { padding: 8px 12px; border: 1px solid #ccc; }
  </style>
</head>
<body>

<h1>Clan Ranking</h1>
<p id="fecha"></p>
<table id="tabla">
  <thead>
    <tr>
      <th>#</th>
      <th>Player</th>
      <th>Chests</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
fetch('ranking.json')
  .then(r => r.json())
  .then(data => {
    const date = new Date(data.generated_at);
    document.getElementById("fecha").textContent = "Updated at: " + date.toLocaleString();
    const tbody = document.querySelector("#tabla tbody");
    data.ranking.forEach(p => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${p.position}</td>
        <td>${p.player}</td>
        <td>${p.chests}</td>
      `;
      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
